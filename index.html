<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRコード受付システム</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Google Fonts for better typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-inner">
        <h1>QRコード受付</h1>
        <div class="header-controls">
          <div class="mode-switch">
            <button type="button" id="btn-morning" class="mode-btn active">午前モード</button>
            <button type="button" id="btn-afternoon" class="mode-btn">午後モード</button>
          </div>
          <div class="staff-select">
            <label for="staff">担当者:</label>
            <select id="staff">
              <option value="">選択してください</option>
            </select>
            <button type="button" id="btn-settings" class="settings-btn" title="表示項目の設定">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <div id="settings-modal" class="modal" aria-hidden="true">
      <div class="modal-content">
        <h2>表示項目のカスタマイズ</h2>
        <div class="settings-section">
          <h3>午前モード</h3>
          <div id="morning-fields" class="field-checkboxes"></div>
        </div>
        <div class="settings-section">
          <h3>午後モード</h3>
          <div id="afternoon-fields" class="field-checkboxes"></div>
        </div>
        <button type="button" id="btn-settings-close" class="modal-close">閉じる</button>
      </div>
    </div>

    <main class="main">
      <div class="main-inner">
        <div class="reader-section">
          <div class="reader-wrapper">
            <div id="reader" class="qr-reader"></div>
            <div class="scanner-overlay">
              <div class="scanner-guide"></div>
            </div>
          </div>
        </div>
        
        <div class="result-section">
          <div id="error-area" class="error-area" aria-live="polite"></div>
          <div id="participant-area" class="participant-area">
            <div class="placeholder-wrapper">
              <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="qr-placeholder-icon"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><rect x="7" y="7" width="3" height="3"></rect><rect x="14" y="7" width="3" height="3"></rect><rect x="7" y="14" width="3" height="3"></rect><rect x="14" y="14" width="3" height="3"></rect></svg>
              <p class="placeholder">QRコードをスキャンしてください</p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/qr-scanner.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
